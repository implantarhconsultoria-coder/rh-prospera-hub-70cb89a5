name: Deploy Automático - TOPAC PRO

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: production
      url: https://topac-pro.vercel.app

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm install --legacy-peer-deps

      - name: 🔍 Verificar TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

      - name: 🏗️ Build do projeto
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: ✅ Validar build
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build falhou - pasta dist não encontrada"
            exit 1
          fi
          echo "✅ Build validado com sucesso"

      - name: 🚀 Deploy na Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          production: true

      - name: 📢 Notificar sucesso
        if: success()
        run: |
          echo "✅ Deploy realizado com sucesso!"
          echo "🔗 URL: https://topac-pro.vercel.app"

      - name: 🚨 Notificar erro
        if: failure()
        run: |
          echo "❌ Deploy falhou. Verifique os logs acima."
          exit 1
