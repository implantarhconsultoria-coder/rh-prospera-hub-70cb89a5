name: Patch app mecanico

on:
  push:
    branches:
      - fix/app-mecanico-producao

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/app-mecanico-producao
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Corrigir fluxo do abastecimento
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/app-mecanico/pages/AbastecimentoPage.tsx')
          text = path.read_text(encoding='utf-8')

          old_error = '''      setScanError(msg);
              return toast.error(msg);'''.replace('      return', '      return')
          if old_error not in text:
              old_error = '''      setScanError(msg);
      return toast.error(msg);'''
          new_error = '''      setScanError(msg);
      setLoading(false);
      return toast.error(msg);'''
          if old_error not in text:
              raise SystemExit('Trecho de erro do QR nao encontrado')
          text = text.replace(old_error, new_error, 1)

          old_success = '''    setStep("painel");
    void getBrowserLocation().then(setCapturedLocation);
  };'''
          new_success = '''    setStep("painel");
    setLoading(false);
    void getBrowserLocation().then(setCapturedLocation);
  };'''
          if old_success not in text:
              raise SystemExit('Trecho de sucesso do QR nao encontrado')
          text = text.replace(old_success, new_success, 1)

          type_start = text.find('type OcrResult = {')
          type_end = text.find('\n\nconst CANONICAL_BASE_URL', type_start)
          if type_start < 0 or type_end < 0:
              raise SystemExit('Tipo OCR antigo nao encontrado')
          text = text[:type_start] + text[type_end + 2:]

          reading_start = text.find('function ReadingCard(')
          reading_end = text.find('\n\nfunction Field(', reading_start)
          if reading_start < 0 or reading_end < 0:
              raise SystemExit('Componente OCR antigo nao encontrado')
          text = text[:reading_start] + text[reading_end + 2:]

          dead_start = text.find('function normalizeCombustivel(')
          dead_end = text.find('function getErrorMessage(', dead_start)
          if dead_start < 0 or dead_end < 0:
              raise SystemExit('Bloco OCR antigo nao encontrado')
          text = text[:dead_start] + text[dead_end:]

          if 'tesseract.js' in text or 'analisarFotoLocal' in text or 'OcrResult' in text:
              raise SystemExit('OCR ainda presente apos limpeza')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remover rotina temporaria
        run: rm .github/workflows/temp-patch-app-mecanico.yml

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Validar build
        run: npm run build

      - name: Salvar correcao
        run: |
          git config user.name "TOPAC Automation"
          git config user.email "actions@users.noreply.github.com"
          git add src/app-mecanico/pages/AbastecimentoPage.tsx .github/workflows/temp-patch-app-mecanico.yml
          git commit -m "Corrige fluxo de abastecimento do app mecanico"
          git push origin HEAD:fix/app-mecanico-producao
