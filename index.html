<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bloqueia tradução automática do navegador (Google Translate / Edge / etc).
         A tradução automática reescreve o DOM e quebra o React com erros como
         "insertBefore" e gera textos absurdos ("Cenoura", "Vegets", "Ay"). -->
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="pt-BR" />
    <!-- Cache busting: força o navegador a sempre buscar a versão mais nova,
         essencial para o app dos mecânicos (/m/:token) refletir mudanças. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Topac RH PRO | Plataforma Multiempresas</title>
    <meta name="description" content="Topac RH — Plataforma central de RH, DP e controle operacional multiempresa.">
    <meta name="author" content="Topac RH" />

    <meta name="twitter:card" content="summary_large_image" />

  <meta name="twitter:title" content="Topac RH PRO | Plataforma Multiempresas">
  <meta property="og:description" content="Topac RH — Plataforma central de RH, DP e controle operacional multiempresa.">
  <meta name="twitter:description" content="Topac RH — Plataforma central de RH, DP e controle operacional multiempresa.">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=20260524-2">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=20260524-2">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260524-2">
  <link rel="manifest" href="/manifest.json?v=20260524-2">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TOPAC RH PRO">
  <script>
    (function () {
      var RESCUE_ID = "20260525-html-rescue";
      var shown = false;

      function root() {
        return document.getElementById("root");
      }

      function memoryStorage() {
        var data = {};
        return {
          getItem: function (key) { return Object.prototype.hasOwnProperty.call(data, key) ? data[key] : null; },
          setItem: function (key, value) { data[key] = String(value); },
          removeItem: function (key) { delete data[key]; },
          clear: function () { data = {}; },
          key: function (index) { return Object.keys(data)[index] || null; },
          get length() { return Object.keys(data).length; }
        };
      }

      function ensureStorage(name) {
        try {
          var storage = window[name];
          var key = "__topac_storage_probe__";
          storage.setItem(key, "1");
          storage.removeItem(key);
        } catch (e) {
          try {
            Object.defineProperty(window, name, {
              configurable: true,
              value: memoryStorage()
            });
          } catch (ignored) {}
        }
      }

      ensureStorage("localStorage");
      ensureStorage("sessionStorage");

      function showRecovery(message) {
        var target = root();
        var onlyBootFallback = target && target.querySelector("[data-topac-boot-fallback]");
        if (!target || shown || (target.childElementCount > 0 && !onlyBootFallback)) return;
        shown = true;
        target.innerHTML = [
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Arial,sans-serif;background:#050b16;color:#fff">',
          '<div style="max-width:430px;width:100%;border:1px solid rgba(34,211,238,.25);border-radius:16px;padding:24px;background:#101829;box-shadow:0 20px 70px rgba(0,0,0,.35)">',
          '<h1 style="margin:0 0 8px;font-size:20px">TOPAC RH PRO</h1>',
          '<p style="margin:0 0 18px;color:#cbd5e1;font-size:14px;line-height:1.45">' + message + '</p>',
          '<button onclick="window.topacRecoveryClear()" style="width:100%;border:0;border-radius:10px;padding:12px;font-weight:700;background:#35d8f2;color:#06111f">Limpar cache e reabrir</button>',
          '<button onclick="location.href=\'/?reopen=' + RESCUE_ID + '-' + Date.now() + '\'" style="width:100%;margin-top:10px;border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:11px;font-weight:700;background:transparent;color:#fff">Recarregar sem limpar sessao</button>',
          '</div>',
          '</div>'
        ].join("");
      }

      window.topacRecoveryClear = function () {
        var tasks = [];
        try { localStorage.clear(); } catch (e) {}
        try { sessionStorage.clear(); } catch (e) {}
        try {
          if ("serviceWorker" in navigator) {
            tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
            }));
          }
        } catch (e) {}
        try {
          if ("caches" in window) {
            tasks.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) { return caches.delete(key); }));
            }));
          }
        } catch (e) {}
        Promise.all(tasks).catch(function () {}).then(function () {
          location.replace("/?recovered=" + RESCUE_ID + "-" + Date.now());
        });
      };

      window.addEventListener("error", function (event) {
        var target = event && event.target;
        if (target && target.tagName === "SCRIPT") {
          showRecovery("O pacote da plataforma nao carregou neste navegador. Limpe o cache local para abrir a versao publicada agora.");
          return;
        }
        setTimeout(function () {
          showRecovery("A plataforma encontrou um erro antes de iniciar. Limpe o cache local para restaurar o acesso.");
        }, 800);
      }, true);

      window.addEventListener("unhandledrejection", function () {
        setTimeout(function () {
          showRecovery("A sessao antiga nao conseguiu iniciar. Limpe o cache local para abrir novamente.");
        }, 800);
      });

      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          showRecovery("O carregamento demorou mais que o esperado. Limpe o cache local para abrir a versao atual.");
        }, 2500);
      });
    })();
  </script>
</head>

  <body class="notranslate" translate="no">
    <div id="root">
      <div data-topac-boot-fallback style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Arial,sans-serif;background:#050b16;color:#fff">
        <div style="max-width:430px;width:100%;border:1px solid rgba(34,211,238,.25);border-radius:16px;padding:24px;background:#101829;box-shadow:0 20px 70px rgba(0,0,0,.35)">
          <h1 style="margin:0 0 8px;font-size:20px">TOPAC RH PRO</h1>
          <p style="margin:0 0 18px;color:#cbd5e1;font-size:14px;line-height:1.45">Carregando acesso seguro...</p>
          <button onclick="window.topacRecoveryClear && window.topacRecoveryClear()" style="width:100%;border:0;border-radius:10px;padding:12px;font-weight:700;background:#35d8f2;color:#06111f">Limpar cache e reabrir</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
